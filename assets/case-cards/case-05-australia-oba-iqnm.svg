<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">中国护士澳洲 OBA 初筛案例</title>
  <desc id="desc">A Chinese-first case card showing how the skill screens Australia Ahpra NMBA OBA registration questions for internationally qualified nurses.</desc>
  <rect width="1200" height="630" fill="#f7fbf8"/>
  <rect x="54" y="48" width="1092" height="534" rx="28" fill="#ffffff" stroke="#b8d5c2" stroke-width="2"/>
  <rect x="54" y="48" width="1092" height="96" rx="28" fill="#2b6f5f"/>
  <text x="92" y="108" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="36" font-weight="700" fill="#ffffff">案例 4：中国护士问澳洲 OBA 注册路径</text>
  <text x="92" y="188" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="29" font-weight="700" fill="#184b41">用户问题</text>
  <text x="92" y="230" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="27" fill="#263645">国内注册护士，想通过 Ahpra / NMBA / OBA 去澳洲做 RN。</text>
  <text x="92" y="294" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="29" font-weight="700" fill="#184b41">Skill 先拆层</text>
  <text x="92" y="337" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="25" fill="#263645">Self-check、Stream、Portfolio、NCLEX-RN、OSCE、Registration。</text>
  <text x="92" y="399" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="29" font-weight="700" fill="#184b41">关键边界</text>
  <text x="92" y="442" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="25" fill="#5f2222">注册、就业、签证、ANMAC 和移民评估是不同层，不能合成承诺。</text>
  <rect x="92" y="492" width="1016" height="54" rx="12" fill="#e6f3ee"/>
  <text x="116" y="528" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="23" fill="#2b6f5f">Next: document traceability, English, OSCE feasibility, official checks.</text>
</svg>
