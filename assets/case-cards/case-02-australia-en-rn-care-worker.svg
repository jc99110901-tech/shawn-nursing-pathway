<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">澳洲 EN RN 护工区别案例</title>
  <desc id="desc">A Chinese-first case card showing how the skill separates Australia Registered Nurse, Enrolled Nurse, and care worker roles.</desc>
  <rect width="1200" height="630" fill="#f5f9ff"/>
  <rect x="54" y="48" width="1092" height="534" rx="28" fill="#ffffff" stroke="#b9cde8" stroke-width="2"/>
  <rect x="54" y="48" width="1092" height="96" rx="28" fill="#285f9f"/>
  <text x="92" y="108" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="38" font-weight="700" fill="#ffffff">案例 2：澳洲 EN、RN 和护工的区别</text>
  <text x="92" y="188" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="29" font-weight="700" fill="#173b63">用户问题</text>
  <text x="92" y="230" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="28" fill="#263645">先做护工，后面是不是就能变澳洲注册护士？</text>
  <text x="92" y="294" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="29" font-weight="700" fill="#173b63">Skill 先区分</text>
  <text x="92" y="337" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="26" fill="#263645">RN 注册护士、EN 登记护士、护工/护理员是不同角色和层级。</text>
  <text x="92" y="400" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="29" font-weight="700" fill="#173b63">关键风险</text>
  <text x="92" y="443" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="26" fill="#5f2222">照护工作不自动等于护士注册，学历、英语、注册和签证要分开核实。</text>
  <rect x="92" y="492" width="1016" height="54" rx="12" fill="#e8f1fb"/>
  <text x="116" y="528" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="24" fill="#285f9f">Next: role definition, NMBA/Ahpra check, school fees, visa risk.</text>
</svg>
